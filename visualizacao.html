<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Levita - Telemetria</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-shape circle-1"></div>
    <div class="bg-shape circle-2"></div>
    <div class="bg-shape sphere-1"></div>
    <div class="bg-shape sphere-2"></div>

    <nav class="navbar animate-fade-in">
        <div class="logo">LEVITA</div>
        <ul class="nav-links">  
            <li><a href="index.html">Início</a></li>
            <li><a href="visualizacao.html" class="active">Visualização</a></li>
            <li><a href="equipe.html">Equipe</a></li>
            <li><a href="sobre.html" class="btn-neon">SOBRE O PROJETO</a></li>
        </ul>
    </nav>

    <main class="container dashboard animate-slide-up">
        <section class="visual-model card glass">
            
            <div class="panel-header">
                <h2>Resposta do Sistema PID (Teórico)</h2>
                <div class="error-badge glass pulse-border">
                    <span class="label">Erro Atual</span>
                    <span class="value code-font" id="val-erro">0.000</span>
                </div>
            </div>
            
            <div class="visual-container">
                <div class="chart-container">
                    <canvas id="pidChart"></canvas>
                </div>
                
                <div class="levitator-container">
                    <div class="levitator-css">
                        <div class="base-plate"></div>
                        <div class="pillar"></div>
                        <div class="top-arm"></div>
                        <div class="top-nut"></div>
                        <div class="coil"></div>
                        
                        <div id="linha-setpoint" class="linha-alvo"><span>SP</span></div>

                        <div id="ima-movel" class="magnet">
                            <div class="magnet-line"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <aside class="data-panel">
            
            <div class="sim-controls glass">
                <button id="btn-play" class="btn-solid play-btn">▶ Iniciar Simulação</button>
                <button id="btn-reset" class="btn-neon reset-btn">⟳ Resetar</button>
            </div>

            <div class="data-grid">
                <div class="data-card glass highlight-sp">
                    <span class="label">SetPoint</span>
                    <input type="number" id="input-sp" class="pid-input code-font" min="2" max="18" step="0.5" value="14.0">
                </div>
                <div class="data-card glass">
                    <span class="label">Posição Inicial</span>
                    <input type="number" id="input-init-pv" class="pid-input code-font" min="0" max="18" step="0.5" value="7.0">
                </div>

                <div class="data-card glass">
                    <span class="label">Proporcional (Kp)</span>
                    <input type="number" id="input-kp" class="pid-input code-font" min="0" max="100" step="0.5" value="15.0">
                </div>
                <div class="data-card glass">
                    <span class="label">Integral (Ki)</span>
                    <input type="number" id="input-ki" class="pid-input code-font" min="0" max="20" step="0.1" value="1.5">
                </div>
                <div class="data-card glass">
                    <span class="label">Derivativo (Kd)</span>
                    <input type="number" id="input-kd" class="pid-input code-font" min="0" max="100" step="0.5" value="0.3">
                </div>
                </div>
        </aside>
    </main>

    <footer class="footer">
        <p>Projeto Levita &copy; 2026 - Desenvolvido para fins acadêmicos e educacionais.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
